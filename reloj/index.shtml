    <script>

      const dateLocalizacion = {
        dayNames: ["domingo", "lunes", "martes", "miércoles", "jueves", "viernes", "sábado"],
        abbreviatedDayNames: ["do", "lun", "mar", "mié", "jue", "vie", "sáb"],
        shortestDayNames: ["do", "lu", "ma", "mi", "ju", "vi", "sá"],
        firstLetterDayNames: ["d", "l", "m", "m", "j", "v", "s"],
        /* Month Name Strings */
        monthNames: ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"],
        abbreviatedMonthNames: ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"],
      }
      var tick = function () {
        var clock = Date.now();
        let elDate = new Date();
        var clockFormat = elDate.toLocaleTimeString();
        var cdateFormat = elDate.toLocaleDateString();
        let cMes = dateLocalizacion.monthNames[elDate.getMonth()]
        let dSemana = dateLocalizacion.dayNames[elDate.getDay()]
        let dMes = elDate.getDate();
        let dYear = elDate.getFullYear();
        var cDateCompleto = `${dSemana} ${dMes} de ${cMes} de ${dYear}`
        // console.log(clockFormat)
        $('.hora').text(clockFormat)
        $('.dia').text(cDateCompleto)
      }
      tick();
      // let elDate = new Date();

      setInterval(() => {
        tick()
      }, 1000)


    </script>


    <script>
      function darkMode() {
        var element = document.body;
        element.className = "dark-mode";
      }
      function lightMode() {
        var element = document.body;
        element.className = "light-mode";
      }

      function toggle() {
        var element = document.body;
        debugger
        element.classList.toggle("dark-mode");
        // $('#logoSaaS').css('filter', 'invert(1)')
      }

      window.matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', event => {
          if (event.matches) {
            //dark mode
            darkMode()
          } else {
            //light mode
            lightMode()
          }
        })



    </script>
